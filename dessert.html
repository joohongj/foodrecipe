<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Visualization Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Fjalla+One&family=Just+Another+Hand&family=Love+Light&family=Nanum+Brush+Script&family=Nanum+Pen+Script&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Zen+Loop:ital@0;1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- Add any external javascript libraries here with a <script> tag -->

</head>

<body>

  <div class="wrapper">
    <header>
      <h1 class="logo"><img src="images/logo.png">The Dish Daily<img src="images/logo2.png"></h1>
    </header>
    <nav>
      <ul>
        <li><a href="about.html">Food News</a></li>
        <li><a href="food.html">Search Food</a></li>
        <li><a href="dessert.html">Food Gallery</a></li>

      </ul>
    </nav>
    <h2>Dessert Finder </h2>

    <div class="search-section">
      <input type="text" id="searchInput" placeholder="Search desserts...">
      <button onclick="searchFood()">Search</button>
      <button onclick="randomDessert()"> Surprise Me</button>
    </div>

    <!-- Quick dessert buttons -->
    <div class="quick-buttons">
      <button onclick="quickDessert('cake')">Cake</button>
      <button onclick="quickDessert('ice cream')">Ice Cream</button>
      <button onclick="quickDessert('cookies')">Cookies</button>
      <button onclick="quickDessert('chocolate')">Chocolate</button>
    </div>

    <div id="results"></div>


    <!-- this is for flashy advertize -->
    <div class="adanimation">
      <img src="images/ad1.png" alt="ad1">
      <img src="images/ad2.png" alt="ad2">
      <img src="images/ad3.png" alt="ad3">
    </div>



    <footer>
      &copy; Nafisa, Mamadou & Joo
      <ul>
        <li><a href="https://fdc.nal.usda.gov/api-guide" class="footerp" target="_blank">USDA API</a></li>
        <li><a href="https://stock.adobe.com/" class="footerp" target="_blank">Adobe Stock</a></li>
      </ul>
    </footer>
  </div>

  <script src="script.js"></script>
</body>

</html>
